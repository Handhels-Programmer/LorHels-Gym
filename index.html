<!DOCTYPE html>
<html lang="do">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LorHels Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse-fast { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .8; transform: scale(0.95); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.5s ease-out forwards; }
        .animate-pulse-fast { animation: pulse-fast 1s infinite; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans overflow-hidden selection:bg-indigo-500/30">

    <div class="flex h-screen">
        <aside id="sidebar" class="w-20 lg:w-64 border-r border-slate-800 bg-slate-900/50 flex flex-col transition-all duration-300 hidden">
            <div class="h-20 flex items-center justify-center lg:justify-start lg:px-6 border-b border-slate-800">
                <div class="bg-indigo-600 p-2 rounded-xl"><i data-lucide="dumbbell" class="text-white"></i></div>
                <span class="ml-3 font-black text-xl text-white tracking-tight hidden lg:block">LorHels<span class="text-indigo-500">Gym</span></span>
            </div>
            <nav id="nav-links" class="flex-1 py-6 flex flex-col gap-2 px-3 overflow-y-auto"></nav>
            <div class="p-4 border-t border-slate-800 bg-slate-900">
                <div class="flex items-center gap-3 px-3 py-2 rounded-xl bg-slate-800/50 text-slate-400 text-xs mb-3">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-500"></div>
                    <span id="status-text" class="hidden lg:block font-medium">Estado: ...</span>
                </div>
                <button onclick="window.App.logout()" class="w-full flex items-center justify-center lg:justify-start gap-3 px-3 py-2 rounded-xl text-red-400 hover:bg-red-500/10 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i><span class="hidden lg:block text-sm font-bold">Cerrar Sesión</span>
                </button>
            </div>
        </aside>
        <main class="flex-1 overflow-y-auto p-4 lg:p-8 relative">
            <div id="main-content" class="max-w-5xl mx-auto h-full"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0oo_S8sZnguFoC18zmJrZMJPBFg9OhbI",
            authDomain: "lorhels-gym.firebaseapp.com",
            projectId: "lorhels-gym",
            storageBucket: "lorhels-gym.firebasestorage.app",
            messagingSenderId: "90007984643",
            appId: "1:90007984643:web:35d579f940206c3a924c36"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- ESTADO GLOBAL ---
        const AppState = {
            isAuthenticated: false, authMode: 'login', currentView: 'dashboard',
            user: { id: '', name: '', role: 'user', email: '', trainerId: null },
            subscription: { plan: null, status: 'inactive', expiresAt: null, maxClients: 0 }, 
            profile: { weight: 0, height: 0 },
            routines: [], 
            workoutHistory: [], // Aquí se guardará el registro de rendimiento
            showRoutineForm: false, 
            routineDraft: { name: '', exercises: [] },
            plans: [], 
            
            // --- NUEVO: Estado del Entrenamiento Activo ---
            activeWorkout: null, 
            timerInterval: null,

            adminData: { 
                pendingUsers: [], activeUsers: [], stats: { athletes: 0, trainers: 0, activePlans: 0, exercises: 0 },
                exercises: [], pendingExercises: [], showExerciseForm: false, plans: [], showPlanForm: false 
            },
            trainersList: [],
            trainerData: { clients: [], pendingClients: [], view: 'list', selectedClient: null } 
        };

        const FirebaseDB = {
            getUserRef() { return auth.currentUser ? doc(db, "users", auth.currentUser.uid) : null; },
            async saveAllData() {
                const ref = this.getUserRef();
                if (!ref) return;
                try {
                    await setDoc(ref, {
                        user: AppState.user, subscription: AppState.subscription, profile: AppState.profile,
                        routines: AppState.routines, workoutHistory: AppState.workoutHistory
                    });
                } catch (error) { console.error("Error guardando:", error); }
            },
            async loadAllData() {
                const ref = this.getUserRef();
                if (!ref) return false;
                try {
                    const docSnap = await getDoc(ref);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        AppState.user = data.user || AppState.user;
                        AppState.subscription = data.subscription || AppState.subscription;
                        AppState.profile = data.profile || AppState.profile;
                        AppState.routines = data.routines || AppState.routines;
                        AppState.workoutHistory = data.workoutHistory || AppState.workoutHistory;
                        return true;
                    }
                    return false;
                } catch (error) { return false; }
            }
        };

        const App = {
            init() {
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        AppState.isAuthenticated = true;
                        const dataExists = await FirebaseDB.loadAllData();
                        if (!dataExists) {
                            AppState.user.id = user.uid;
                            AppState.user.email = user.email;
                            await FirebaseDB.saveAllData();
                        } else {
                            await this.checkSubscriptionStatus();
                        }
                        this.changeView('dashboard');
                    } else {
                        AppState.isAuthenticated = false;
                        this.resetState();
                        this.render();
                    }
                });
            },

            async checkSubscriptionStatus() {
                if (AppState.subscription.status === 'active' && AppState.subscription.expiresAt) {
                    const expDate = new Date(AppState.subscription.expiresAt);
                    const now = new Date();
                    if (now > expDate) {
                        AppState.subscription.status = 'inactive';
                        await FirebaseDB.saveAllData();
                        if(AppState.user.role !== 'admin') alert("⚠️ Tu plan ha expirado. Por favor, reactiva tu suscripción para continuar.");
                    }
                }
            },

            resetState() {
                AppState.user = { id: '', name: '', role: 'user', email: '', trainerId: null };
                AppState.subscription = { plan: null, status: 'inactive', expiresAt: null, maxClients: 0 };
                AppState.profile = { weight: 0, height: 0 };
                AppState.routines = []; AppState.workoutHistory = [];
                AppState.routineDraft = { name: '', exercises: [] };
                AppState.plans = [];
                AppState.activeWorkout = null;
                clearInterval(AppState.timerInterval);
                AppState.trainerData = { clients: [], pendingClients: [], view: 'list', selectedClient: null };
            },

            toggleAuthMode() { AppState.authMode = AppState.authMode === 'login' ? 'register' : 'login'; this.render(); },
            
            async handleAuthForm(event) {
                event.preventDefault();
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-pass').value;
                try {
                    if (AppState.authMode === 'login') await signInWithEmailAndPassword(auth, email, password);
                    else {
                        AppState.user.name = document.getElementById('auth-name').value;
                        AppState.user.role = document.getElementById('auth-role').value;
                        await createUserWithEmailAndPassword(auth, email, password);
                    }
                } catch (error) { alert("Error en la autenticación: " + error.message); }
            },
            async logout() { await signOut(auth); },

            changeView(view) {
                if (AppState.activeWorkout && view !== 'routines') {
                    if(!confirm("Tienes un entrenamiento en curso. ¿Deseas salir y perder el progreso no guardado?")) return;
                    this.cancelWorkout();
                }
                AppState.currentView = view;
                if (view === 'adminPanel') { this.loadUsersAdmin(); this.loadExercises(); }
                if (view === 'dashboard' && AppState.user.role === 'admin') this.loadAdminStats();
                if (view === 'dashboard' && AppState.user.role === 'user' && !AppState.user.trainerId) this.loadTrainers();
                if (view === 'exercises' || view === 'routines') this.loadExercises();
                if (view === 'plans') {
                    if (AppState.user.role === 'admin') this.loadPlansAdmin();
                    else this.loadUserPlans();
                }
                if (view === 'trainerPanel' && AppState.user.role === 'trainer') {
                    AppState.trainerData.view = 'list';
                    this.loadTrainerClients();
                }
                this.render();
            },

            // --- MOTOR DE ENTRENAMIENTO (ACTIVO) ---
            startWorkout(routineIndex) {
                const routine = AppState.routines[routineIndex];
                if (!routine || !routine.exercises || routine.exercises.length === 0) return alert("Esta rutina no tiene ejercicios.");

                AppState.activeWorkout = {
                    routineId: routine.id,
                    routineName: routine.name,
                    exercises: JSON.parse(JSON.stringify(routine.exercises)), // Copia profunda
                    currentExIndex: 0,
                    currentSet: 1,
                    isResting: false,
                    restTimeRemaining: 0,
                    startTime: new Date().toISOString(),
                    logs: [] // Guardará: { exName, sets: [{ reps, weight, volume }] }
                };

                // Inicializar log para el primer ejercicio
                AppState.activeWorkout.logs.push({
                    exerciseName: AppState.activeWorkout.exercises[0].name,
                    exerciseId: AppState.activeWorkout.exercises[0].id,
                    setsCompleted: []
                });

                this.render();
            },

            finishSet() {
                const aw = AppState.activeWorkout;
                const currentEx = aw.exercises[aw.currentExIndex];
                
                // Obtener valores de los inputs
                const repsInput = document.getElementById('workout-reps').value;
                const weightInput = document.getElementById('workout-weight').value;
                
                const reps = parseInt(repsInput) || currentEx.reps;
                const weight = parseFloat(weightInput) || currentEx.weight || 0;
                const volume = reps * weight; // Lógica de Peso Levantado solicitada

                // Guardar en el log
                aw.logs[aw.currentExIndex].setsCompleted.push({
                    setNumber: aw.currentSet,
                    reps: reps,
                    weight: weight,
                    volume: volume
                });

                // Lógica de avance
                if (aw.currentSet < currentEx.sets) {
                    aw.currentSet++;
                    this.startRest(10); // 60 segundos de descanso por defecto
                } else {
                    if (aw.currentExIndex < aw.exercises.length - 1) {
                        aw.currentExIndex++;
                        aw.currentSet = 1;
                        aw.logs.push({
                            exerciseName: aw.exercises[aw.currentExIndex].name,
                            exerciseId: aw.exercises[aw.currentExIndex].id,
                            setsCompleted: []
                        });
                        this.startRest(90); // Más descanso entre diferentes ejercicios
                    } else {
                        // Fin de la rutina completa
                        this.finishWorkout();
                    }
                }
            },

            startRest(seconds) {
                AppState.activeWorkout.isResting = true;
                AppState.activeWorkout.restTimeRemaining = seconds;
                this.render();

                AppState.timerInterval = setInterval(() => {
                    AppState.activeWorkout.restTimeRemaining--;
                    
                    if (AppState.activeWorkout.restTimeRemaining <= 0) {
                        this.skipRest();
                        this.playAudioBeep();
                    } else {
                        // Actualizar solo el texto para no re-renderizar todo el DOM cada segundo
                        const timerDisplay = document.getElementById('rest-timer-display');
                        if (timerDisplay) timerDisplay.innerText = this.formatTime(AppState.activeWorkout.restTimeRemaining);
                    }
                }, 1000);
            },

            skipRest() {
                clearInterval(AppState.timerInterval);
                AppState.activeWorkout.isResting = false;
                this.render();
            },

            playAudioBeep() {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, ctx.currentTime); // Tono alto
                    osc.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.5); // Medio segundo
                } catch(e) { console.log("Audio no soportado en este navegador."); }
            },

            async finishWorkout() {
                const aw = AppState.activeWorkout;
                clearInterval(AppState.timerInterval);
                
                // Calcular totales
                let totalVolume = 0;
                let totalSets = 0;
                let totalReps = 0;

                aw.logs.forEach(log => {
                    log.setsCompleted.forEach(set => {
                        totalVolume += set.volume;
                        totalSets += 1;
                        totalReps += set.reps;
                    });
                });

                const workoutRecord = {
                    id: Date.now().toString(),
                    routineId: aw.routineId,
                    routineName: aw.routineName,
                    date: new Date().toISOString(),
                    durationMinutes: Math.round((new Date() - new Date(aw.startTime)) / 60000),
                    totalVolume: totalVolume,
                    totalSets: totalSets,
                    totalReps: totalReps,
                    logs: aw.logs
                };

                // Guardar en el historial global
                if (!AppState.workoutHistory) AppState.workoutHistory = [];
                AppState.workoutHistory.push(workoutRecord);

                try {
                    await FirebaseDB.saveAllData();
                    alert(`¡Entrenamiento completado! 🔥\n\nResumen:\nSeries: ${totalSets}\nVolumen Total: ${totalVolume} lbs levantadas.`);
                } catch(e) {
                    alert("Error guardando el historial.");
                }

                AppState.activeWorkout = null;
                this.render();
            },

            cancelWorkout() {
                clearInterval(AppState.timerInterval);
                AppState.activeWorkout = null;
                this.render();
            },

            formatTime(seconds) {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            },
            // --- FIN MOTOR ENTRENAMIENTO ---

            async saveProfile() {
                const weight = document.getElementById('profile-weight').value;
                const height = document.getElementById('profile-height').value;
                AppState.profile.weight = parseFloat(weight);
                AppState.profile.height = parseInt(height);
                try { await FirebaseDB.saveAllData(); alert("¡Perfil actualizado correctamente! 💪"); } 
                catch (error) { alert("Error al guardar los datos."); }
            },

            requestSubscription(planId, planName) {
                const adminPhone = "18091234567";
                const text = `Hola Admin! Soy ${AppState.user.name} (${AppState.user.role}). Acabo de transferir para el *${planName}*. ID: ${AppState.user.id}`;
                AppState.subscription.plan = planId;
                AppState.subscription.status = 'pending';
                FirebaseDB.saveAllData();
                alert("Serás redirigido a WhatsApp con tu comprobante.");
                window.open(`https://wa.me/${adminPhone}?text=${encodeURIComponent(text)}`, '_blank');
                this.changeView('dashboard');
            },

            async loadPlansAdmin() {
                try {
                    const snap = await getDocs(collection(db, "plans"));
                    AppState.adminData.plans = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    this.render();
                } catch(e) { console.error("Error cargando planes:", e); }
            },

            async loadUserPlans() {
                try {
                    const q = query(collection(db, "plans"), where("targetRole", "==", AppState.user.role));
                    const snap = await getDocs(q);
                    AppState.plans = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    this.render();
                } catch(e) { console.error("Error cargando planes:", e); }
            },

            togglePlanForm() { AppState.adminData.showPlanForm = !AppState.adminData.showPlanForm; this.render(); },

            async savePlan(event) {
                event.preventDefault();
                const data = {
                    name: document.getElementById('plan-name').value,
                    price: document.getElementById('plan-price').value,
                    desc: document.getElementById('plan-desc').value,
                    durationDays: parseInt(document.getElementById('plan-duration').value),
                    maxClients: parseInt(document.getElementById('plan-max-clients').value || 0), 
                    targetRole: document.getElementById('plan-role').value,
                    createdAt: new Date().toISOString()
                };
                try {
                    await addDoc(collection(db, "plans"), data);
                    alert("¡Plan creado exitosamente! 🚀");
                    this.togglePlanForm();
                    this.loadPlansAdmin();
                } catch(e) { alert("Error al guardar el plan."); }
            },

            async deletePlan(planId) {
                if(confirm("¿Estás seguro de eliminar este plan?")) {
                    try { await deleteDoc(doc(db, "plans", planId)); this.loadPlansAdmin(); } 
                    catch(e) { console.error(e); }
                }
            },

            async loadAdminStats() {
                try {
                    const snap = await getDocs(collection(db, "users"));
                    let athletes = 0, trainers = 0, activePlans = 0;
                    snap.forEach(doc => {
                        const data = doc.data();
                        if (data.user?.role === 'user') athletes++;
                        if (data.user?.role === 'trainer') trainers++;
                        if (data.subscription?.status === 'active') activePlans++;
                    });
                    const exSnap = await getDocs(collection(db, "exercises"));
                    let exerciseCount = 0;
                    exSnap.forEach(doc => {
                        const ex = doc.data();
                        if (ex.status === 'approved' || !ex.status) exerciseCount++;
                    });
                    AppState.adminData.stats = { athletes, trainers, activePlans, exercises: exerciseCount }; 
                    this.render();
                } catch(e) { console.error("Error cargando stats:", e); }
            },

            async loadUsersAdmin() {
                try {
                    const snap = await getDocs(collection(db, "users"));
                    const allUsers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    AppState.adminData.pendingUsers = allUsers.filter(u => u.subscription?.status === 'pending');
                    AppState.adminData.activeUsers = allUsers.filter(u => u.subscription?.status === 'active');
                    this.render();
                } catch(e) { console.error(e); }
            },

            async approveUser(userId, planId) {
                try {
                    let expiresAt = null;
                    let maxClients = 0;
                    if (planId) {
                        const planSnap = await getDoc(doc(db, "plans", planId));
                        if (planSnap.exists()) {
                            const planData = planSnap.data();
                            const durationDays = planData.durationDays || 30;
                            const expDate = new Date();
                            expDate.setDate(expDate.getDate() + durationDays);
                            expiresAt = expDate.toISOString();
                            maxClients = planData.maxClients || 0; 
                        }
                    }
                    await updateDoc(doc(db, "users", userId), { 
                        "subscription.status": "active", "subscription.expiresAt": expiresAt, "subscription.maxClients": maxClients 
                    });
                    alert("✅ Usuario aprobado. Fecha de vencimiento y límites configurados.");
                    this.loadUsersAdmin(); 
                } catch(e) { console.error(e); alert("Error al aprobar."); }
            },

            async loadTrainerClients() {
                try {
                    const q = query(collection(db, "users"), where("user.trainerId", "==", AppState.user.id));
                    const snap = await getDocs(q);
                    const allClients = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    AppState.trainerData.clients = allClients.filter(c => c.subscription?.status === 'active');
                    AppState.trainerData.pendingClients = allClients.filter(c => c.subscription?.status !== 'active');
                    this.render();
                } catch(e) { console.error(e); }
            },

            viewClientDetail(clientId) {
                const client = AppState.trainerData.clients.find(c => c.id === clientId);
                if (client) { AppState.trainerData.selectedClient = client; AppState.trainerData.view = 'detail'; this.render(); }
            },
            backToClientList() { AppState.trainerData.selectedClient = null; AppState.trainerData.view = 'list'; this.render(); },
            openRoutineBuilder() { AppState.trainerData.view = 'create_routine'; AppState.routineDraft = { name: '', exercises: [] }; this.loadExercises(); },
            cancelClientRoutine() { AppState.trainerData.view = 'detail'; this.render(); },

            async saveClientRoutine(event) {
                event.preventDefault();
                const name = document.getElementById('routine-name').value;
                const client = AppState.trainerData.selectedClient;
                if (!name || AppState.routineDraft.exercises.length === 0) return alert("Ingresa un nombre y al menos un ejercicio.");
                const exercisesWithDetails = AppState.routineDraft.exercises.map((ex, i) => {
                    return { ...ex, sets: parseInt(document.getElementById(`sets-${i}`).value), reps: parseInt(document.getElementById(`reps-${i}`).value) }
                });
                const newRoutine = { id: Date.now().toString(), name: name, exercises: exercisesWithDetails, createdAt: new Date().toISOString() };
                if (!client.routines) client.routines = [];
                client.routines.push(newRoutine);
                try {
                    await updateDoc(doc(db, "users", client.id), { routines: client.routines });
                    alert(`¡Rutina asignada a ${client.user.name} con éxito! 🔥`);
                    AppState.trainerData.view = 'detail';
                    this.render();
                } catch(e) { console.error(e); alert("Error asignando la rutina al alumno."); }
            },

            async deleteClientRoutine(routineIndex) {
                if(confirm("¿Estás seguro de eliminar esta rutina del perfil del alumno?")) {
                    const client = AppState.trainerData.selectedClient;
                    client.routines.splice(routineIndex, 1);
                    try { await updateDoc(doc(db, "users", client.id), { routines: client.routines }); this.render(); } 
                    catch(e) { console.error(e); alert("Error al eliminar la rutina."); }
                }
            },

            async loadExercises() {
                try {
                    const snap = await getDocs(collection(db, "exercises"));
                    const allExercises = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    AppState.adminData.exercises = allExercises.filter(ex => ex.status === 'approved' || !ex.status);
                    AppState.adminData.pendingExercises = allExercises.filter(ex => ex.status === 'pending');
                    this.render();
                } catch(e) { console.error("Error cargando ejercicios:", e); }
            },

            toggleExerciseForm() { AppState.adminData.showExerciseForm = !AppState.adminData.showExerciseForm; this.render(); },

            async saveExercise(event) {
                event.preventDefault();
                const isAdmin = AppState.user.role === 'admin';
                const data = {
                    name: document.getElementById('ex-name').value, image: document.getElementById('ex-image').value,
                    preparation: document.getElementById('ex-prep').value, execution: document.getElementById('ex-exec').value,
                    details: document.getElementById('ex-details').value,
                    primaryMuscles: Array.from(document.querySelectorAll('input[name="primaryMuscle"]:checked')).map(el => el.value),
                    secondaryMuscles: Array.from(document.querySelectorAll('input[name="secondaryMuscle"]:checked')).map(el => el.value),
                    createdBy: AppState.user.id, creatorName: AppState.user.name, status: isAdmin ? 'approved' : 'pending', 
                    createdAt: new Date().toISOString()
                };
                if (data.primaryMuscles.length === 0) return alert("Debes seleccionar al menos un músculo primario.");
                try {
                    await addDoc(collection(db, "exercises"), data);
                    if (isAdmin) alert("¡Ejercicio añadido a la biblioteca con éxito! 🏋️‍♂️");
                    else alert("¡Gracias! Tu ejercicio ha sido enviado. Un administrador lo revisará pronto para aprobarlo. ⏳");
                    this.toggleExerciseForm();
                    this.loadExercises();
                } catch (error) { console.error(error); alert("Error al guardar el ejercicio."); }
            },

            async approveExercise(exId) {
                try { await updateDoc(doc(db, "exercises", exId), { status: "approved" }); alert("✅ Ejercicio aprobado."); this.loadExercises(); } 
                catch(e) { console.error(e); alert("Error al aprobar."); }
            },

            async deleteExercise(exId, isRejection = false) {
                const msg = isRejection ? "¿Estás seguro de rechazar y borrar este ejercicio propuesto?" : "¿Estás seguro de eliminar este ejercicio?";
                if(confirm(msg)) {
                    try { await deleteDoc(doc(db, "exercises", exId)); this.loadExercises(); } 
                    catch(e) { console.error(e); }
                }
            },

            async loadTrainers() {
                try {
                    const q = query(collection(db, "users"), where("user.role", "==", "trainer"));
                    const snap = await getDocs(q);
                    AppState.trainersList = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    this.render();
                } catch(e) { console.error(e); }
            },

            async selectTrainer(trainerId) {
                AppState.user.trainerId = trainerId;
                await FirebaseDB.saveAllData();
                alert("¡Entrenador seleccionado con éxito! Ya puedes ver tus rutinas.");
                this.render();
            },

            toggleRoutineForm() { AppState.showRoutineForm = !AppState.showRoutineForm; AppState.routineDraft = { name: '', exercises: [] }; this.render(); },

            addExerciseToRoutine() {
                const select = document.getElementById('routine-exercise-select');
                const exId = select.value;
                if (!exId) return alert("Selecciona un ejercicio primero.");
                AppState.routineDraft.name = document.getElementById('routine-name').value;
                const ex = AppState.adminData.exercises.find(e => e.id === exId);
                AppState.routineDraft.exercises.push({ id: ex.id, name: ex.name, sets: 4, reps: 10 });
                this.render();
            },

            removeExerciseFromRoutine(index) {
                AppState.routineDraft.name = document.getElementById('routine-name').value;
                AppState.routineDraft.exercises.splice(index, 1);
                this.render();
            },

            async saveRoutine(event) {
                event.preventDefault();
                const name = document.getElementById('routine-name').value;
                if (!name || AppState.routineDraft.exercises.length === 0) return alert("Ingresa un nombre y al menos un ejercicio.");
                const exercisesWithDetails = AppState.routineDraft.exercises.map((ex, i) => {
                    return { ...ex, sets: parseInt(document.getElementById(`sets-${i}`).value), reps: parseInt(document.getElementById(`reps-${i}`).value) }
                });
                const newRoutine = { id: Date.now().toString(), name: name, exercises: exercisesWithDetails, createdAt: new Date().toISOString() };
                AppState.routines.push(newRoutine);
                try { await FirebaseDB.saveAllData(); alert("¡Rutina guardada con éxito! 🔥"); this.toggleRoutineForm(); } 
                catch(e) { alert("Error guardando la rutina."); }
            },

            async deleteRoutine(index) {
                if(confirm("¿Estás seguro de que deseas eliminar esta rutina?")) {
                    AppState.routines.splice(index, 1);
                    await FirebaseDB.saveAllData();
                    this.render();
                }
            },

            async updateWeight(routineIndex, exerciseIndex, weightValue) {
                AppState.routines[routineIndex].exercises[exerciseIndex].weight = weightValue;
                try { await FirebaseDB.saveAllData(); } catch(e) { console.error("Error guardando el peso:", e); }
            },

            updateStatusIndicator() {
                const dot = document.getElementById('status-dot'); const text = document.getElementById('status-text');

                if (AppState.user.role === 'admin') { dot.className = "w-2 h-2 rounded-full bg-purple-500"; text.innerText = "Modo: Admin"; }
                else {
                    const status = AppState.subscription.status;
                    if (status === 'active') { dot.className = "w-2 h-2 rounded-full bg-emerald-500"; text.innerText = AppState.user.role === 'trainer' ? "Entrenador Activo" : "Plan Activo"; }
                    else if (status === 'pending') { dot.className = "w-2 h-2 rounded-full bg-amber-500"; text.innerText = "Validando Pago"; }
                    else { dot.className = "w-2 h-2 rounded-full bg-red-500"; text.innerText = "Sin Suscripción"; }
                }
            },

                const main = document.getElementById('main-content');

                    sidebar.classList.add('hidden'); main.innerHTML = this.views.auth(); lucide.createIcons(); return;

                        <div class="max-w-2xl mx-auto animate-slide-up">
                            <header class="mb-8">
                                <h2 class="text-3xl font-black text-white">Mi Perfil</h2>
                                <p class="text-slate-400">Mantén tus datos actualizados para mejorar tus rutinas.</p>
                            </header>
                            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-6">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-sm text-slate-400 mb-2">Peso (kg)</label>
                                        <input type="number" id="profile-weight" value="${AppState.profile.weight || ''}" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                                    </div>
                                    <div>
                                        <label class="block text-sm text-slate-400 mb-2">Altura (cm)</label>
                                        <input type="number" id="profile-height" value="${AppState.profile.height || ''}" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                                    </div>
                                </div>
                                <button onclick="window.App.saveProfile()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-indigo-600/20">Guardar Cambios</button>
                            </div>
                        </div>
                    `;
                },
                
                routines() {
                    // --- NUEVO: VISTA DE ENTRENAMIENTO ACTIVO ---
                    if (AppState.activeWorkout) {
                        const aw = AppState.activeWorkout;
                        const currentEx = aw.exercises[aw.currentExIndex];
                        const isLastExercise = aw.currentExIndex === aw.exercises.length - 1;
                        const isLastSet = aw.currentSet === currentEx.sets;

                        if (aw.isResting) {
                            return `
                                <div class="max-w-xl mx-auto text-center py-20 animate-fade-in">
                                    <h2 class="text-4xl font-black text-white mb-2">¡Tiempo de Descanso! ⏱️</h2>
                                    <p class="text-slate-400 mb-12">Recupera el aliento. Siguiente: ${isLastSet && !isLastExercise ? aw.exercises[aw.currentExIndex + 1].name : currentEx.name}</p>
                                    
                                    <div class="w-48 h-48 mx-auto bg-slate-900 border-4 border-indigo-500 rounded-full flex items-center justify-center mb-12 shadow-[0_0_50px_-12px_rgba(99,102,241,0.5)] animate-pulse-fast">
                                        <span id="rest-timer-display" class="text-5xl font-black text-white">${window.App.formatTime(aw.restTimeRemaining)}</span>
                                    </div>

                                    <button onclick="window.App.skipRest()" class="px-8 py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl transition-colors">
                                        Saltar Descanso
                                    </button>
                                </div>
                            `;
                        }

                        return `
                            <div class="max-w-2xl mx-auto animate-slide-up pb-20">
                                <header class="flex justify-between items-center mb-6">
                                    <div>
                                        <p class="text-indigo-400 font-bold text-sm uppercase tracking-wider">${aw.routineName}</p>
                                        <h2 class="text-2xl font-black text-white">Ejercicio ${aw.currentExIndex + 1} de ${aw.exercises.length}</h2>
                                    </div>
                                    <button onclick="window.App.cancelWorkout()" class="p-2 text-slate-500 hover:text-red-400 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
                                </header>

                                <div class="bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
                                    <div class="h-48 bg-slate-800 flex items-center justify-center border-b border-slate-700">
                                        <i data-lucide="image" class="w-12 h-12 text-slate-600"></i>
                                    </div>
                                    
                                    <div class="p-8">
                                        <h3 class="text-3xl font-black text-white text-center mb-6">${currentEx.name}</h3>
                                        
                                        <div class="flex justify-center items-center gap-8 mb-10">
                                            <div class="text-center">
                                                <p class="text-slate-400 text-sm font-medium mb-1">Serie Actual</p>
                                                <p class="text-4xl font-black text-indigo-400">${aw.currentSet} <span class="text-xl text-slate-500">/ ${currentEx.sets}</span></p>
                                            </div>
                                            <div class="h-12 w-px bg-slate-800"></div>
                                            <div class="text-center">
                                                <p class="text-slate-400 text-sm font-medium mb-1">Reps Meta</p>
                                                <p class="text-4xl font-black text-white">${currentEx.reps}</p>
                                            </div>
                                        </div>

                                        <div class="grid grid-cols-2 gap-4 mb-8">
                                            <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800">
                                                <label class="block text-center text-slate-400 text-sm font-medium mb-2">Peso (lbs)</label>
                                                <input type="number" id="workout-weight" value="${currentEx.weight || ''}" class="w-full bg-transparent text-center text-3xl font-black text-white focus:outline-none" placeholder="0">
                                            </div>
                                            <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800">
                                                <label class="block text-center text-slate-400 text-sm font-medium mb-2">Reps Logradas</label>
                                                <input type="number" id="workout-reps" value="${currentEx.reps}" class="w-full bg-transparent text-center text-3xl font-black text-white focus:outline-none">
                                            </div>
                                        </div>

                                        <button onclick="window.App.finishSet()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 text-white text-xl font-black rounded-2xl shadow-[0_0_40px_-10px_rgba(16,185,129,0.5)] transition-all transform hover:scale-[1.02]">
                                            ${isLastSet && isLastExercise ? 'Finalizar Entrenamiento 🎉' : 'Terminé la Serie'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    // --- FIN VISTA ENTRENAMIENTO ---

                    if (AppState.showRoutineForm) {
                        const exOptions = AppState.adminData.exercises.map(ex => `<option value="${ex.id}">${ex.name}</option>`).join('');
                        const selectedExercisesHtml = AppState.routineDraft.exercises.map((ex, index) => `
                            <div class="bg-slate-800 p-4 rounded-xl flex items-center justify-between border border-slate-700 mb-3 animate-fade-in">
                                <div class="font-bold text-white flex-1">${ex.name}</div>
                                <div class="flex items-center gap-4">
                                    <div><label class="text-xs text-slate-400 block text-center mb-1">Series</label><input type="number" id="sets-${index}" value="${ex.sets}" min="1" class="w-16 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1 text-white text-center focus:outline-none focus:border-indigo-500"></div>
                                    <div><label class="text-xs text-slate-400 block text-center mb-1">Reps</label><input type="number" id="reps-${index}" value="${ex.reps}" min="1" class="w-16 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1 text-white text-center focus:outline-none focus:border-indigo-500"></div>
                                    <button type="button" onclick="window.App.removeExerciseFromRoutine(${index})" class="mt-5 p-2 text-red-400 hover:bg-red-500/10 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                </div>
                            </div>
                        `).join('');

                        return `
                            <div class="space-y-6 animate-zoom-in max-w-3xl mx-auto pb-10">
                                <header class="flex justify-between items-center">
                                    <h2 class="text-2xl font-bold text-white">Construir Nueva Rutina</h2>
                                    <button onclick="window.App.toggleRoutineForm()" class="text-slate-400 hover:text-white px-4 py-2 bg-slate-800 rounded-xl">Cancelar</button>
                                </header>
                                <form onsubmit="window.App.saveRoutine(event)" class="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-6 shadow-xl">
                                    <div><label class="text-sm text-slate-400 mb-2 block">Nombre de la Rutina</label><input type="text" id="routine-name" value="${AppState.routineDraft.name}" required placeholder="Ej: Pecho y Tríceps - Día 1" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500"></div>
                                    <div class="border-t border-slate-800 pt-6">
                                        <h3 class="text-lg font-bold text-white mb-4">Ejercicios de la Rutina</h3>
                                        <div class="flex flex-col md:flex-row gap-3 mb-6">
                                            <select id="routine-exercise-select" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
                                                <option value="">-- Selecciona un ejercicio de la biblioteca --</option>
                                                ${exOptions}
                                            </select>
                                            <button type="button" onclick="window.App.addExerciseToRoutine()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl whitespace-nowrap transition-colors">Añadir Ejercicio</button>
                                        </div>
                                        <div id="routine-exercises-list" class="space-y-2">
                                            ${selectedExercisesHtml || '<div class="text-center p-8 border-2 border-dashed border-slate-800 rounded-xl"><p class="text-slate-500">No has añadido ejercicios aún.</p></div>'}
                                        </div>
                                    </div>
                                    <button type="submit" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl shadow-lg shadow-emerald-600/20 transition-colors mt-4">Guardar Rutina</button>
                                </form>
                            </div>
                        `;
                    }

                    const routinesList = AppState.routines.map((r, i) => `
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 hover:border-indigo-500/50 transition-colors shadow-lg flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <div><h3 class="font-black text-xl text-white">${r.name}</h3><p class="text-sm text-indigo-400 font-bold mt-1">${r.exercises.length} Ejercicios</p></div>
                                    <button onclick="window.App.deleteRoutine(${i})" class="text-slate-500 hover:text-red-400 p-2 hover:bg-red-500/10 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                </div>
                                <div class="space-y-2 mt-4 bg-slate-950/50 p-4 rounded-xl border border-slate-800/50 mb-6">
                                    ${r.exercises.map((ex, exIndex) => `
                                        <div class="flex justify-between items-center text-sm border-b border-slate-800/50 pb-2 last:border-0 last:pb-0">
                                            <span class="text-slate-300 font-medium truncate pr-4">${ex.name}</span>
                                            <span class="text-indigo-400 font-bold px-2 py-1 bg-indigo-500/10 rounded-md whitespace-nowrap">${ex.sets} x ${ex.reps}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <button onclick="window.App.startWorkout(${i})" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-black rounded-xl flex items-center justify-center gap-2 transition-transform transform hover:scale-[1.02] shadow-lg shadow-emerald-600/20">
                                <i data-lucide="play" class="w-5 h-5"></i> Iniciar Entrenamiento
                            </button>
                        </div>
                    `).join('');

                    return `
                        <div class="space-y-6 animate-fade-in pb-10">
                            <header class="flex justify-between items-center mb-8">
                                <div><h1 class="text-3xl font-black text-white">Mis Rutinas</h1><p class="text-slate-400">Organiza tu entrenamiento</p></div>
                                <button onclick="window.App.toggleRoutineForm()" class="flex items-center gap-2 px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg shadow-indigo-600/20 transition-colors"><i data-lucide="plus" class="w-5 h-5"></i> Crear</button>
                            </header>
                            ${AppState.routines.length > 0 ? `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">${routinesList}</div>` : `<div class="text-center py-20 bg-slate-900 border border-slate-800 rounded-2xl"><i data-lucide="calendar" class="w-16 h-16 text-slate-700 mx-auto mb-4"></i><p class="text-slate-400 text-lg">No tienes rutinas asignadas.</p></div>`}
                        </div>
                    `;
                }
            }
        };

        window.App = App;
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
